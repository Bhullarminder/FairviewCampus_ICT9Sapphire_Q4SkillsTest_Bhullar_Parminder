<!DOCTYPE html>
<html lang="en">
<head>
    <title>Skills test Ict Q4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
    <div class=" p-4 shadow mx-auto" style="width 350px;">
        <h3 class="text-center mb-3">Login</h3>

        <form>
            <div class="mb-3">
                <input type="text" id="username" class="form-control" placeholder="Username">
            </div>

            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Password">
            </div>

            <button type="button" id="loginBtn" class="btn btn-primary w-100" onclick="login()">Login</button>
        </form>

        <p id="errorMsg" class="text-danger mt-3 text-center"></p>
        <a href="">Forgot username/password</a>
    </div>
</div>

<script>
let attempt_counter = 0;


function login(){

    
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    do {
        
        if (username === "6767" && password === "6868") {
            alert("Login successful!");
            attempt_counter = 0;
            document.getElementById("errorMsg").innerHTML = "";
            window.location.href = "notebooks.html"; 
            break; 
        } else {
            attempt_counter++;
            document.getElementById("errorMsg").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
        }

    } while (false); 

    if (attempt_counter >= 3) {
        alert("Too many failed attempts!");
        document.getElementById("loginBtn").disabled = true; 
    }
}


function logout() {
    let confirmLogout = confirm("Exit now?");
    
    if (confirmLogout) {
        window.location.href = "index.html";
    }
}

function message(){
    alert("Not available at this time.");
}
</script>
</body>
</html>
