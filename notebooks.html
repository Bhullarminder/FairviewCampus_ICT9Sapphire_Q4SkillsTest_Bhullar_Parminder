<!DOCTYPE html>
<html lang="en">
<head>
    <title>Notebooks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="d-flex">

    <div class="bg-secondary p-3 vh-100" style="width: 220px;">
        <h4 class="text-center">Menu</h4>
        <hr>

        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link text-light" href="#">Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-light" href="#">My Notes</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-light" href="#" onclick="logout()">Logout</a>
            </li>
        </ul>
    </div>

    <div class="container mt-4">

        <h2 class="mb-4">My Notebooks</h2>

        <div class="row g-4">

            <div class="col-md-4">
                <div id="mathCard" class="card text-dark h-100" onclick="openNotebook('Math')">
                    <div class="card-body text-center">
                        <h4>Math</h4>
                        <p>Math Notes!!</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div id="ictCard" class="card text-dark h-100" onclick="openNotebook('ICT')">
                    <div class="card-body text-center">
                        <h4>ICT</h4>
                        <p>ICT Notes!!</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div id="scienceCard" class="card text-dark h-100" onclick="openNotebook('Science')">
                    <div class="card-body text-center">
                        <h4>Science</h4>
                        <p>Science Notes!!</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div id="moreClassesCard" class="card text-dark h-100" onclick="openNotebook('More')">
                    <div class="card-body text-center">
                        <h4>More Classes</h4>
                        <p>Open for more classes!!</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
function logout() {
    let confirmLogout = confirm("Exit now?");
    if (confirmLogout) {
        window.location.href = "index.html";
    }
}

function openNotebook(subject) {
    alert("Error " + subject + " 505");
}
</script>

</body>
</html>
